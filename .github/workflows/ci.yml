name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cache Godot 4.3
        uses: actions/cache@v4
        with:
          path: ~/.local/share/godot-ci/4.3
          key: godot-4.3-linux-x86_64
      - name: Install Godot 4.3
        env:
          GODOT_VERSION: '4.3'
        run: tools/release/install_godot.sh
      - name: Validate project and run tests
        env:
          GODOT_BIN: godot
        run: tools/content_validation/run_all.sh
      - name: Verify clean authored tree
        run: |
          git diff --check
          test -z "$(git status --porcelain --untracked-files=no)"
